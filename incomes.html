<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incomes</title>
  <link rel="stylesheet" href="styles.css">
  <script src="incomes.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
  <!-- Header row: Title left, Extra button right -->
  <header class="header-row">
    <h1>INCOMES</h1>
    <button class="extra-btn" onclick="toggleExtra()">Extra</button>
  </header>

  <!-- Extra Income collapsible -->
  <div id="extra" class="form-card hidden">
  <label for="extra-desc">Description</label>
  <input type="text" id="extra-desc" placeholder="e.g., Freelance Project">

  <label for="extra-amount">Amount</label>
  <input type="number" id="extra-amount" placeholder="e.g., 2000" onchange="saveExtra()">
</div>

  <div class="form-card">
  <label for="incomeDescription">Description</label>
  <input type="text" id="incomeDescription" placeholder="e.g., March Salary">

  <label for="incomeAmount">Amount</label>
  <input type="number" id="incomeAmount" placeholder="e.g., 15000">
  
  </div>

<button class="save-btn" onclick="saveIncome()">Save Income</button>
<div id="incomeList"></div>

<button class="danger-btn" onclick="resetIncomes()">Reset All Incomes</button>

<script src="incomes.js"></script>
