<!-- COSTS MAIN -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costs Tracker</title>
  <!-- Load Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Link external stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Greeting and Amount Section -->
  <div class="header">
    <p class="greeting">Hello,</p>
    <h1 class="name">Lucia</h1>

    <div class="amount-display">
      <strong>$500.00</strong>
      <p class="label">Available Amount</p>
    </div>
  </div>

  <!-- Line Graph -->
  <h2>Monthly Balance</h2>
  <canvas id="costChart"></canvas>

  <!-- Buttons -->
  <div class="button-container">
    <!-- INPUT BUTTON -->
    <div class="input-group">
      <button onclick="toggleInputMenu()">Input</button>
      <div id="inputMenu" class="sub-buttons">
        <button onclick="location.href='spendings.html'">Spendings</button>
        <button onclick="location.href='incomes.html'">Incomes</button>
      </div>
    </div>
    
    <!-- SUMMARY BUTTON -->
    <button onclick="location.href='budgetSummary.html'">Budget Summary</button>
  </div>

  <!-- Chart Script -->
  <script>
    const ctx = document.getElementById('costChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sept','Oct','Nov','Dec'],
        datasets: [{
          label: 'Monthly Balance',
          data: [100, 450, 600, 550, 700, 650, 1000, 250, 200, 600, 500, 1200],
          borderColor: '#56C1E3',
          backgroundColor: 'rgba(86, 193, 227, 0.2)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });

    // Toggle INPUT sub-buttons
    function toggleInputMenu() {
      const menu = document.getElementById('inputMenu');
      menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
    }
  </script>

  <!-- Service worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(reg => console.log("Service Worker registered:", reg.scope))
        .catch(err => console.log("Service Worker failed:", err));
    }
  </script>
</body>
</html>
