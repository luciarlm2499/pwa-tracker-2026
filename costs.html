<!-- COSTS MAIN -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costs Tracker</title>
  <!-- Load Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* General page styling */
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background-color: #1F1E1E; /* dark background */
      color: #FFFFFF;            /* white text */
      margin: 0;
      padding: 40px 20px;
      text-align: left;
    }

    /* Greeting */
    .greeting {
        font-size: 20px;
        color: #BBBBBB;
        margin: 0;
    }
    .name {
        font-size: 32px;
        color: #FFFFFF;
        margin: 5px 0 30px;
    }

    /* Amount Display */
    .amount-display {
        font-size: 36px;
        color: #FFFFFF;
        margin-bottom: 30px;
    }
    .amount-display strong {
        font-size: 40px;
        display: block;
    }
    .amount-display .label {
        font-size: 16px;
        color: #BBBBBB;
        margin-top: 5px;
    }
    /* Chart styling */
    h2 {
      margin-top: 30px;
      color: #56C1E3;
      font-size: 20px;
      text-align: center;
    }
    canvas {
      width: 90% !important;
      max-width: 600px;
      height: 250px !important;
      margin: 20px auto;
      display: block;
    }

    /* Buttons styling */
    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    button {
      width: 150px;
      height: 50px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      background-color: #56C1E3;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
    }
    button:hover {
      background-color: #3D8DA6;
      transform: scale(1.05);
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .amount {
        font-size: 22px;
      }
      canvas {
        height: 180px !important;
      }
      button {
        width: 100%;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
<!-- Greeting and Amount Section -->
<div class="header">
  <p class="greeting">Hello,</p>
  <h1 class="name">Lucia</h1>

  <div class="amount-display">
    <strong>$500.00</strong>
    <p class="label">Available Amount</p>
  </div>
</div>

  <!-- Line Graph -->
  <h2>Monthly Balance</h2>
  <canvas id="costChart"></canvas>

  <!-- Buttons -->
  <div class="button-container">
    <button onclick="location.href='spendings.html'">Spendings</button>
    <button onclick="location.href='incomes.html'">Incomes</button>
  </div>

  <!-- Chart Script -->
  <script>
    const ctx = document.getElementById('costChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sept','Oct','Nov','Dec'],
        datasets: [{
          label: 'Monthly Balance',
          data: [100, 450, 600, 550, 700, 650, 1000, 250, 200, 600, 500, 1200],
          borderColor: '#56C1E3',
          backgroundColor: 'rgba(86, 193, 227, 0.2)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
  </script>

   <!-- Service worker registration for offline functionality -->
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(reg => console.log("Service Worker registered:", reg.scope))
      .catch(err => console.log("Service Worker failed:", err));
  }
</script>
</body>
</html>
